name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.x'
      - name: Install dependencies
        run: nimble install -y --depsOnly
      - name: Run tests
        run: nimble test
      - name: Compile examples
        run: nimble examples
